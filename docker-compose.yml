# RepoWrangler — self-hosted, zero Cloudflare.
#
# The Node server host serves the SPA and the API on one port. Two database
# modes:
#
#   Demo / quick start (default) — SQLite file in the `rw-data` volume:
#     docker compose up --build                          # http://localhost:8080
#
#   Production — PostgreSQL container on the private compose network (the
#   database is never exposed outside the Docker network). In .env set:
#     POSTGRES_PASSWORD=<long random string>
#     DATABASE_URL=postgres://repowrangler:<that password>@postgres:5432/repowrangler
#   then:
#     docker compose --profile postgres up -d --build
#
# To connect a real GitHub App, copy .env.example → .env, fill it in, and
# re-run compose with DEMO_MODE=false.
#
services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: repo-wrangler-server:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      # Public default: demo mode, mock data, no secrets. Set to "false" and
      # supply the GitHub App secrets below (via .env) for a real instance.
      DEMO_MODE: "true"
      # Sign-in providers (PN-5): CSV of github,gitlab,entra,google,local.
      AUTH_PROVIDERS: "github"
      # Secret source (PN-4): env (default). Uncomment the block below to read
      # secrets from Docker secrets files instead (SECRET_SOURCE=file).
      # SECRET_SOURCE: "file"
      # SECRETS_DIR: "/run/secrets"
    # Real-instance configuration and secrets live here (git-ignored). Optional
    # in demo mode — compose tolerates a missing file.
    env_file:
      - path: .env
        required: false
    volumes:
      - rw-data:/app/data
    # Docker secrets alternative to .env (PN-4, SECRET_SOURCE=file): mount files
    # named after each secret (e.g. session-secret) under /run/secrets.
    # secrets:
    #   - session-secret
    #   - github-client-secret
    restart: unless-stopped

  # Production database (enable with: docker compose --profile postgres up).
  # Reachable only on the compose-internal network as host "postgres" — no
  # published port, so it is unreachable from outside the machine. The server
  # switches to it when DATABASE_URL is set (see header comment). On the very
  # first boot the server may restart once while postgres initializes — its
  # restart policy handles that.
  postgres:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: repowrangler
      POSTGRES_USER: repowrangler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env for the postgres profile}
    volumes:
      - rw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repowrangler -d repowrangler"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  rw-data:
  rw-pgdata:

# secrets:
#   session-secret:
#     file: ./secrets/session-secret
#   github-client-secret:
#     file: ./secrets/github-client-secret
