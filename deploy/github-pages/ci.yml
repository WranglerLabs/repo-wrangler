# Mode B — build the SPA and publish to GitHub Pages.
# Copy to .github/workflows/deploy-pages.yml to enable.
# Set repo variables: API_BASE_URL (your Worker URL), BASE_PATH (e.g. /repo-wrangler/
# for a project site, or / for a user/org site). Enable Pages via GitHub Actions.
# The Worker must allow this Pages origin via CORS_ALLOWED_ORIGINS.
name: deploy-pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build SPA
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_BASE_PATH: ${{ vars.BASE_PATH }}
        run: pnpm --filter @repo-wrangler/web build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
