# Mode A — build + deploy the integrated Worker to Cloudflare.
# Copy to .github/workflows/deploy-cloudflare.yml to enable.
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Your D1 id lives in a git-ignored wrangler.local.jsonc that CI reconstructs
# from the CF_D1_DATABASE_ID secret so it is never committed.
name: deploy-cloudflare
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Write git-ignored D1 override
        run: |
          cat > wrangler.local.jsonc <<'JSON'
          { "d1_databases": [ { "binding": "DB", "database_name": "repo-wrangler",
            "database_id": "${{ secrets.CF_D1_DATABASE_ID }}", "migrations_dir": "migrations" } ] }
          JSON
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.jsonc -c wrangler.local.jsonc
