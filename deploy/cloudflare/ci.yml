# Integrated topology (Tier 0) — build, apply migrations, and deploy the Worker to Cloudflare.
# Copy to .github/workflows/deploy-cloudflare.yml to enable.
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CF_D1_DATABASE_ID.
# Migrations are applied automatically on every deploy, so schema changes ship with
# the code — a deployer never has to run a migration by hand.
name: deploy-cloudflare
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Point wrangler.jsonc at this deployment's D1 database
        run: sed -i "s|<your-d1-database-id>|${{ secrets.CF_D1_DATABASE_ID }}|" wrangler.jsonc
      - name: Apply database migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply repo-wrangler --remote
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
