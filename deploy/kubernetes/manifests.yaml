# RepoWrangler — Kubernetes deployment (self-hosted, zero Cloudflare).
#
# Runs the apps/server container (SPA + API + scheduler) on SQLite, with the
# database on a PersistentVolumeClaim. This is the same verified container that
# `docker compose up` runs. Deploy with:
#
#   kubectl apply -f deploy/kubernetes/manifests.yaml
#
# Edit the image, ingress host, and (for real mode) the Secret below first — or
# use the Helm chart in ./chart for templated values.
#
# SQLite is single-writer, so this runs a single replica with Recreate strategy.
# Multi-replica scale is the Postgres adapter's job (roadmap PN-1).
---
apiVersion: v1
kind: Namespace
metadata:
  name: repo-wrangler
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: repo-wrangler-config
  namespace: repo-wrangler
data:
  PORT: "8080"
  SQLITE_PATH: "/app/data/repo-wrangler.db"
  # Sign-in providers (PN-5): ordered CSV of github,gitlab,entra,google,local.
  # Each appears only when also configured. Falls back to AUTH_MODE if empty.
  AUTH_PROVIDERS: "github"
  AUTH_MODE: "github_app"
  # Demo mode: mock data, no secrets. Set to "false" and fill the Secret below.
  DEMO_MODE: "true"
  ENABLE_SCHEDULER: "true"
  # Scheduler driver (PN-3): in-process (single replica) | external (the CronJob
  # below POSTs /internal/cron/run — use with a shared Postgres + >1 replica) | off.
  SCHEDULER_MODE: "in-process"
  # Secret source (PN-4): env (default) | file (mount secrets, set SECRETS_DIR) |
  # keyvault (KEY_VAULT_URI + workload identity) | composite.
  SECRET_SOURCE: "env"
  ALLOWED_GITHUB_USERS: ""
  PUBLIC_BASE_URL: ""
  CORS_ALLOWED_ORIGINS: ""
---
# Real mode only — replace the placeholders and set DEMO_MODE=false above.
# In demo mode this Secret is unused (the app tolerates missing values).
apiVersion: v1
kind: Secret
metadata:
  name: repo-wrangler-secrets
  namespace: repo-wrangler
type: Opaque
stringData:
  GITHUB_APP_ID: ""
  GITHUB_APP_PRIVATE_KEY: ""
  GITHUB_WEBHOOK_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  # SESSION_SECRET must be set to a long random value before real mode — a
  # shipped default would be a known session-signing key. Generate one with:
  #   openssl rand -hex 32
  # Demo mode does not read this key (envFrom tolerates it being absent).
  # SESSION_SECRET: ""
  # Only needed when SCHEDULER_MODE=external (authorises the CronJob below).
  CRON_TRIGGER_TOKEN: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: repo-wrangler-data
  namespace: repo-wrangler
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-wrangler
  namespace: repo-wrangler
  labels: { app: repo-wrangler }
spec:
  replicas: 1
  # SQLite = single writer: never run two pods against the same volume.
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: repo-wrangler }
  template:
    metadata:
      labels: { app: repo-wrangler }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: server
          # Replace with your registry image built from apps/server/Dockerfile.
          image: ghcr.io/OWNER/repo-wrangler-server:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: repo-wrangler-config }
            - secretRef: { name: repo-wrangler-secrets }
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: repo-wrangler-data
---
apiVersion: v1
kind: Service
metadata:
  name: repo-wrangler
  namespace: repo-wrangler
spec:
  selector: { app: repo-wrangler }
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: repo-wrangler-scheduler
  namespace: repo-wrangler
  # External-tick scheduler driver (PN-3, ADR-018). Enable this ONLY when the
  # Deployment runs SCHEDULER_MODE=external (e.g. a multi-replica Postgres setup):
  # it drives the same sync work over HTTP so no replica needs an in-process timer.
  # Leave SCHEDULER_MODE=in-process (default) on a single SQLite replica and this
  # CronJob is harmless (the endpoint returns 404 unless external mode is on).
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: tick
              image: curlimages/curl:8.11.0
              env:
                - name: TOKEN
                  valueFrom:
                    secretKeyRef: { name: repo-wrangler-secrets, key: CRON_TRIGGER_TOKEN }
              command: ["sh", "-c"]
              args:
                - >-
                  curl -fsS -X POST
                  -H "authorization: Bearer $TOKEN"
                  "http://repo-wrangler.repo-wrangler.svc.cluster.local/internal/cron/run?job=periodic"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: repo-wrangler
  namespace: repo-wrangler
  annotations:
    # Adjust for your ingress controller / cert-manager setup.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: repo-wrangler.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: repo-wrangler
                port: { number: 80 }
