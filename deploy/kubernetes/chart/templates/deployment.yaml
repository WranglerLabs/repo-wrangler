apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repo-wrangler.name" . }}
  labels: {{- include "repo-wrangler.labels" . | nindent 4 }}
spec:
  replicas: 1
  # SQLite is single-writer — never run two pods against one volume.
  strategy: { type: Recreate }
  selector:
    matchLabels: {{- include "repo-wrangler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "repo-wrangler.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.config.port }}
          env:
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: SQLITE_PATH
              value: {{ .Values.config.sqlitePath | quote }}
            - name: AUTH_MODE
              value: {{ .Values.config.authMode | quote }}
            - name: DEMO_MODE
              value: {{ .Values.demoMode | quote }}
            - name: ENABLE_SCHEDULER
              value: {{ .Values.config.enableScheduler | quote }}
            - name: ALLOWED_GITHUB_USERS
              value: {{ .Values.config.allowedGithubUsers | quote }}
            - name: PUBLIC_BASE_URL
              value: {{ .Values.config.publicBaseUrl | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.config.corsAllowedOrigins | quote }}
          {{- if not .Values.demoMode }}
          envFrom:
            - secretRef:
                name: {{ include "repo-wrangler.secretName" . }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet: { path: /health/live, port: {{ .Values.config.port }} }
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health/ready, port: {{ .Values.config.port }} }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "repo-wrangler.name" . }}-data
