apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "repo-wrangler.name" . }}-data
  labels: {{- include "repo-wrangler.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "repo-wrangler.name" . }}
  labels: {{- include "repo-wrangler.labels" . | nindent 4 }}
spec:
  selector: {{- include "repo-wrangler.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.config.port }}
{{- if and (not .Values.demoMode) (not .Values.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "repo-wrangler.name" . }}-secrets
  labels: {{- include "repo-wrangler.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_APP_ID: {{ .Values.secrets.githubAppId | quote }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.secrets.githubAppPrivateKey | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | quote }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  SESSION_SECRET: {{ .Values.secrets.sessionSecret | quote }}
  CRON_TRIGGER_TOKEN: {{ .Values.secrets.cronTriggerToken | quote }}
{{- end }}
{{- if eq .Values.config.schedulerMode "external" }}
---
# External-tick scheduler driver (PN-3, ADR-018). Rendered only when
# config.schedulerMode=external: drives sync work over HTTP so no replica needs an
# in-process timer. Pair with a shared Postgres and >1 replica.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "repo-wrangler.name" . }}-scheduler
  labels: {{- include "repo-wrangler.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.scheduler.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: tick
              image: {{ .Values.scheduler.image | quote }}
              env:
                - name: TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "repo-wrangler.secretName" . }}
                      key: CRON_TRIGGER_TOKEN
              command: ["sh", "-c"]
              args:
                - >-
                  curl -fsS -X POST
                  -H "authorization: Bearer $TOKEN"
                  "http://{{ include "repo-wrangler.name" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/internal/cron/run?job=periodic"
{{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "repo-wrangler.name" . }}
  labels: {{- include "repo-wrangler.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ include "repo-wrangler.name" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "repo-wrangler.name" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
