name: CI

# Manual/PR-only by operator preference — no push-triggered runs.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      # No dependency cache: the repo intentionally commits no lockfile yet.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build SPA
        run: pnpm build

      - name: Dry-run Worker bundle
        run: pnpm exec wrangler deploy --dry-run
