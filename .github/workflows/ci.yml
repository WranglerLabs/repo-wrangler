name: CI

# Manual/PR-only by operator preference — no push-triggered runs.
# CI verifies dependencies and code (audit + typecheck + unit tests). It does
# NOT build, bundle, or boot the app — building/deploying is not a CI concern.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
