name: CI

# Manual/PR-only by operator preference — no push-triggered runs.
# CI verifies source, builds every release input, and boots the built SPA with
# the Node host through the complete first-run identity boundary.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: [self-hosted, linux, ubuntu-22.04, hcs, repo-wrangler-validation]
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Release contract tests
        run: pnpm test:release-contracts

      - name: Build release inputs
        run: |
          pnpm --filter @repo-wrangler/web build
          pnpm exec wrangler deploy --dry-run --outdir dist/release-staging/cloudflare-worker

      - name: Build Azure deployment input
        uses: azure/CLI@v2
        with:
          azcliversion: 2.87.0
          inlineScript: |
            set -euo pipefail
            mkdir -p dist/release-staging/aca
            az bicep build --file deploy/azure-container-apps/main.bicep --outfile dist/release-staging/aca/main.json

      - name: Smoke-test built Node first run
        run: pnpm test:server-smoke

      - name: Build and smoke-test product container
        shell: bash
        run: |
          set -euo pipefail
          image="repo-wrangler-ci:${GITHUB_SHA}"
          container="repo-wrangler-ci-${GITHUB_RUN_ID}"
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker build --file apps/server/Dockerfile --build-arg APP_VERSION=ci-stabilization --tag "$image" .
          docker run --detach --name "$container" --publish 127.0.0.1:18080:8080 \
            --env DEMO_MODE=false \
            --env AUTH_PROVIDERS=github \
            --env ENABLE_SCHEDULER=false \
            --env SESSION_SECRET=ci-session-secret \
            --env SECRET_ENCRYPTION_KEY=ci-encryption-key \
            "$image"
          node scripts/release/smoke-container.mjs http://127.0.0.1:18080 ci-stabilization

      - name: Assemble no-clone release bundles
        run: |
          node scripts/release/assemble-release-bundles.mjs \
            --version v1.0.13 \
            --image ghcr.io/wranglerlabs/repo-wrangler-server@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            --postgres-image docker.io/library/postgres:16@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb \
            --output dist/release-staging/bundles \
            --compose-template release/templates/compose.yaml \
            --compose-env release/templates/compose.env.example \
            --aca-template dist/release-staging/aca/main.json \
            --cloudflare-worker dist/release-staging/cloudflare-worker/index.js \
            --web-assets apps/web/dist \
            --migrations migrations
          test -f dist/release-staging/bundles/compose/compose.yaml
          test -f dist/release-staging/bundles/azure-container-apps/main.json
          test -f dist/release-staging/bundles/cloudflare/worker.js
          ! grep -R '__REPO_WRANGLER_IMAGE__\|__POSTGRES_IMAGE__' dist/release-staging/bundles
