name: Deploy docs to docs.wranglerlabs.org

# Builds the VitePress docs and deploys them to the Cloudflare Pages project
# `wranglerlabs-docs`, served at https://docs.wranglerlabs.org. Requires repo
# secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      # Root files transcluded into docs/project/*.md via @include — without
      # these the published site silently goes stale on roadmap/changelog edits.
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'CREDITS.md'
      - 'THIRD_PARTY_NOTICES.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

# One concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastUpdated needs full history
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build VitePress site
        run: pnpm docs:build
      - name: Deploy to Cloudflare Pages (wranglerlabs-docs)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy docs/.vitepress/dist --project-name wranglerlabs-docs --branch main --commit-dirty=true
