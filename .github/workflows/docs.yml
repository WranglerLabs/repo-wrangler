name: Request Wrangler Labs docs deployment

# The private site repository owns the combined marketing + docs deployment.
# This workflow uses the installed GitHub App to request that deployment; no
# Cloudflare credentials are stored in the public OSS repository.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      # Root files transcluded into docs/project/*.md via @include — without
      # these the published site silently goes stale on roadmap/changelog edits.
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'CREDITS.md'
      - 'THIRD_PARTY_NOTICES.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create short-lived site deployment token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: WranglerLabs
          repositories: repo-wrangler.org

      - name: Request combined marketing and docs deployment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRODUCT_REF: ${{ github.sha }}
        run: gh workflow run deploy.yml --repo WranglerLabs/repo-wrangler.org --ref main -f product_ref="$PRODUCT_REF"
