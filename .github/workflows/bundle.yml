name: Build deploy bundle

# Produces a deployable bundle (bundled Worker + built SPA assets) as a CI
# artifact. No Cloudflare credentials in CI — the operator downloads the
# artifact and deploys it via the Cloudflare API (or wrangler) themselves.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build SPA
        run: pnpm build

      - name: Bundle Worker (no deploy)
        run: pnpm exec wrangler deploy --dry-run --outdir dist-worker

      - name: Stage bundle
        run: |
          mkdir -p bundle
          cp -r dist-worker bundle/worker
          cp -r apps/web/dist bundle/assets
          cp wrangler.jsonc bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: repo-wrangler-bundle
          path: bundle
          retention-days: 7
