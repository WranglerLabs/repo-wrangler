name: Publish immutable release artifacts

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE: ghcr.io/wranglerlabs/repo-wrangler-server

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate immutable release identity
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          node -e 'const p=require("./package.json"); if (`v${p.version}` !== process.env.GITHUB_REF_NAME) throw new Error(`tag ${process.env.GITHUB_REF_NAME} does not match package version ${p.version}`)'
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          if gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name' 2>/dev/null | grep -q '^release-manifest.json$'; then
            echo "release-manifest.json already exists; immutable release publication will not overwrite it" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish immutable product image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          build-args: APP_VERSION=${{ steps.identity.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Attest product image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Build Cloudflare and ACA release inputs
        run: |
          set -euo pipefail
          pnpm --filter @repo-wrangler/web build
          pnpm exec wrangler deploy --dry-run --outdir dist/staging/cloudflare-worker
          mkdir -p dist/staging/aca
          az bicep build --file deploy/azure-container-apps/main.bicep --outfile dist/staging/aca/main.json

      - name: Resolve immutable PostgreSQL image
        id: postgres
        shell: bash
        run: |
          set -euo pipefail
          digest="$(docker buildx imagetools inspect postgres:16 | awk '/^Digest:/ {print $2; exit}')"
          [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]
          echo "image=docker.io/library/postgres:16@$digest" >> "$GITHUB_OUTPUT"

      - name: Assemble target bundles
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release/assemble-release-bundles.mjs \
            --version "$GITHUB_REF_NAME" \
            --image "${IMAGE}@${{ steps.build.outputs.digest }}" \
            --postgres-image "${{ steps.postgres.outputs.image }}" \
            --output dist/staging/bundles \
            --compose-template release/templates/compose.yaml \
            --compose-env release/templates/compose.env.example \
            --aca-template dist/staging/aca/main.json \
            --cloudflare-worker dist/staging/cloudflare-worker/index.js \
            --web-assets apps/web/dist \
            --migrations migrations
          mkdir -p dist/assets
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "dist/assets/repo-wrangler-compose-${GITHUB_REF_NAME}.tar.gz" -C dist/staging/bundles compose
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "dist/assets/repo-wrangler-aca-${GITHUB_REF_NAME}.tar.gz" -C dist/staging/bundles azure-container-apps
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "dist/assets/repo-wrangler-cloudflare-${GITHUB_REF_NAME}.tar.gz" -C dist/staging/bundles cloudflare

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: dist/assets/repo-wrangler-${{ github.ref_name }}.spdx.json
          upload-artifact: false

      - name: Generate manifest and checksums
        shell: bash
        run: |
          set -euo pipefail
          asset_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          node scripts/release/create-release-spec.mjs \
            --version "$GITHUB_REF_NAME" \
            --released-at "$(git show -s --format=%cI "$GITHUB_SHA")" \
            --asset-base-url "$asset_base" \
            --output dist/assets/release-artifacts.json
          node scripts/release/generate-release-manifest.mjs \
            --spec dist/assets/release-artifacts.json \
            --output dist/assets/release-manifest.json
          rm dist/assets/release-artifacts.json

      - name: Attest downloadable release assets
        id: attest-assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/assets/*.tar.gz
            dist/assets/*.spdx.json
            dist/assets/release-manifest.json

      - name: Publish provenance bundle and checksums
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.attest-assets.outputs.bundle-path }}" "dist/assets/repo-wrangler-${GITHUB_REF_NAME}.provenance.sigstore.json"
          (cd dist/assets && sha256sum repo-wrangler-* release-manifest.json > SHA256SUMS)

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "RepoWrangler ${GITHUB_REF_NAME}" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/assets/*
