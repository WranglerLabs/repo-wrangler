name: Request public demo deployment

# The private demo repository owns the deployment procedure. A release tag here
# uses the installed GitHub App to request a deployment of this exact tag; no
# Cloudflare credentials are stored in the public OSS repository.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create short-lived demo deployment token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: WranglerLabs
          repositories: repo-wrangler.dev

      - name: Request demo deployment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRODUCT_REF: ${{ github.ref_name }}
        run: gh workflow run deploy.yml --repo WranglerLabs/repo-wrangler.dev --ref main -f product_ref="$PRODUCT_REF"
